*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #f0efe9;
  min-height: 100vh;
  color: #1a1a19;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
#app {
  max-width: 420px;
  margin: 0 auto;
  padding: 16px 12px 48px;
}
.card {
  background: #ffffff;
  border: 0.5px solid rgba(0,0,0,0.1);
  border-radius: 16px;
  overflow: hidden;
}
.hbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 16px;
  border-bottom: 0.5px solid rgba(0,0,0,0.08);
  gap: 8px;
}
.title-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
  min-width: 0;
  flex: 1;
}
.app-title {
  font-size: 13px;
  font-weight: 600;
  color: #1a1a19;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.title-input {
  font-size: 13px;
  font-weight: 600;
  border: none;
  background: transparent;
  outline: 2px solid #378ADD;
  outline-offset: 2px;
  color: #1a1a19;
  font-family: inherit;
  border-radius: 3px;
  padding: 1px 4px;
  min-width: 0;
  width: 100%;
}
.date-pill {
  font-size: 11px;
  padding: 3px 9px;
  background: #f0efe9;
  border-radius: 20px;
  color: #6b6a66;
  white-space: nowrap;
  flex-shrink: 0;
}
.back-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 12px;
  color: #6b6a66;
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 2px 0;
  flex-shrink: 0;
  font-family: inherit;
}
.back-btn:hover { color: #1a1a19; }
.pencil-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px;
  opacity: 0.35;
  line-height: 0;
  flex-shrink: 0;
  color: #1a1a19;
}
.pencil-btn:hover { opacity: 0.75; }
.body { padding: 15px; }
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: #a09f9b;
  margin: 0 0 9px;
}
.prog-item { margin-bottom: 9px; }
.prog-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #6b6a66;
  margin-bottom: 4px;
}
.prog-track {
  height: 5px;
  background: #eeede9;
  border-radius: 3px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.divider {
  height: 0.5px;
  background: rgba(0,0,0,0.08);
  margin: 14px 0;
}
.plan-list-item {
  border: 0.5px solid rgba(0,0,0,0.08);
  border-radius: 10px;
  padding: 11px 13px;
  margin-bottom: 7px;
  cursor: pointer;
  transition: background 0.12s;
  user-select: none;
}
.plan-list-item:hover { background: #f8f7f3; }
.plan-list-item:active { background: #f0efe9; }
.plan-list-date { font-size: 12px; font-weight: 500; color: #1a1a19; }
.btn-primary {
  width: 100%;
  padding: 11px;
  font-size: 13px;
  font-weight: 600;
  background: #E6F1FB;
  color: #185FA5;
  border: none;
  border-radius: 9px;
  cursor: pointer;
  margin-bottom: 10px;
  font-family: inherit;
  transition: background 0.15s;
}
.btn-primary:hover { background: #d0e6f8; }
.btn-primary:active { background: #bcd6f4; }
.btn-save {
  width: 100%;
  padding: 11px;
  font-size: 13px;
  font-weight: 600;
  background: #E1F5EE;
  color: #0F6E56;
  border: none;
  border-radius: 9px;
  cursor: pointer;
  margin-top: 6px;
  font-family: inherit;
  transition: background 0.15s;
}
.btn-save:hover { background: #c9eddf; }
.btn-slot-save {
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 500;
  background: #E6F1FB;
  color: #185FA5;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
.btn-slot-save:hover { background: #d0e6f8; }
.btn-add {
  padding: 4px 8px;
  font-size: 10px;
  color: #a09f9b;
  background: none;
  border: 0.5px dashed rgba(0,0,0,0.2);
  border-radius: 4px;
  cursor: pointer;
  width: 100%;
  margin-top: 4px;
  font-family: inherit;
  transition: border-color 0.1s;
}
.btn-add:hover { border-color: rgba(0,0,0,0.35); color: #6b6a66; }
.btn-del {
  background: none;
  border: none;
  cursor: pointer;
  color: #a09f9b;
  font-size: 14px;
  padding: 0 2px;
  line-height: 1;
  flex-shrink: 0;
  font-family: inherit;
}
.btn-del:hover { color: #E24B4A; }
.slot {
  border: 0.5px solid rgba(0,0,0,0.1);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.slot-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: #f8f7f3;
  border-bottom: 0.5px solid rgba(0,0,0,0.08);
}
.slot-title { font-size: 12px; font-weight: 600; color: #1a1a19; }
.slot-body { padding: 10px 12px; }
.slot-body-np { padding: 0 0 8px; }
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  table-layout: fixed;
}
.tbl th {
  font-size: 10px;
  font-weight: 600;
  color: #a09f9b;
  text-align: left;
  padding: 5px 6px;
  background: #f8f7f3;
  border-bottom: 0.5px solid rgba(0,0,0,0.1);
}
.tbl td {
  padding: 5px 6px;
  border-bottom: 0.5px solid rgba(0,0,0,0.07);
  vertical-align: top;
  color: #1a1a19;
  line-height: 1.5;
}
.tbl tr:last-child td { border-bottom: none; }
.cell-period { font-weight: 600; white-space: nowrap; }
.cell-area { white-space: nowrap; color: #6b6a66; }
.st-o { color: #1D9E75; font-weight: 600; }
.st-d { color: #BA7517; font-weight: 600; }
.st-x { color: #E24B4A; font-weight: 600; }
.status-row { display: flex; gap: 4px; flex-wrap: wrap; }
.sb {
  padding: 2px 7px;
  border-radius: 10px;
  border: 0.5px solid rgba(0,0,0,0.12);
  background: none;
  cursor: pointer;
  font-size: 11px;
  color: #6b6a66;
  font-family: inherit;
  transition: all 0.1s;
  line-height: 1.4;
}
.sb:hover { border-color: rgba(0,0,0,0.25); }
.sb.o { background: #E1F5EE; color: #0F6E56; border-color: #5DCAA5; }
.sb.d { background: #FAEEDA; color: #854F0B; border-color: #EF9F27; }
.sb.x { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
.inp {
  width: 100%;
  font-size: 11px;
  padding: 4px 7px;
  border: 0.5px solid rgba(0,0,0,0.15);
  border-radius: 5px;
  background: #ffffff;
  color: #1a1a19;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
}
.inp:focus { border-color: #378ADD; }
.ta {
  width: 100%;
  resize: none;
  font-size: 11px;
  padding: 5px 7px;
  border: 0.5px solid rgba(0,0,0,0.15);
  border-radius: 5px;
  background: #ffffff;
  color: #1a1a19;
  font-family: inherit;
  line-height: 1.5;
  outline: none;
  transition: border-color 0.15s;
}
.ta:focus { border-color: #378ADD; }
.ta-feedback {
  width: 100%;
  resize: none;
  font-size: 12px;
  padding: 9px 11px;
  border: 0.5px solid rgba(0,0,0,0.15);
  border-radius: 8px;
  background: #ffffff;
  color: #1a1a19;
  font-family: inherit;
  line-height: 1.65;
  outline: none;
  min-height: 88px;
  transition: border-color 0.15s;
}
.ta-feedback:focus { border-color: #378ADD; }
.toast {
  background: #E1F5EE;
  color: #0F6E56;
  border: 0.5px solid #5DCAA5;
  border-radius: 9px;
  padding: 10px 15px;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  margin-bottom: 10px;
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.edit-row {
  display: flex;
  gap: 4px;
  align-items: flex-start;
  margin-bottom: 5px;
}
.y-entry {
  border: 0.5px solid rgba(0,0,0,0.1);
  border-radius: 8px;
  padding: 9px 10px;
  margin-bottom: 8px;
  background: #fdfcfa;
}
.empty-state {
  text-align: center;
  padding: 28px 0;
  font-size: 12px;
  color: #a09f9b;
}
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

/* ===== PIN SCREEN ===== */
#pin-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f0efe9;
}
.pin-card {
  background: #ffffff;
  border: 0.5px solid rgba(0,0,0,0.1);
  border-radius: 20px;
  padding: 36px 32px 32px;
  width: 280px;
  text-align: center;
}
.pin-title {
  font-size: 13px;
  font-weight: 600;
  color: #1a1a19;
  margin-bottom: 4px;
}
.pin-sub {
  font-size: 11px;
  color: #a09f9b;
  margin-bottom: 28px;
}
.pin-dots {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 28px;
}
.pin-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #eeede9;
  border: 1.5px solid rgba(0,0,0,0.1);
  transition: background 0.15s, border-color 0.15s;
}
.pin-dot.filled {
  background: #1a1a19;
  border-color: #1a1a19;
}
.pin-dot.error {
  background: #E24B4A;
  border-color: #E24B4A;
}
.pin-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.pin-btn {
  aspect-ratio: 1;
  background: #f8f7f3;
  border: 0.5px solid rgba(0,0,0,0.08);
  border-radius: 50%;
  font-size: 18px;
  font-weight: 500;
  color: #1a1a19;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.1s, transform 0.08s;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 64px;
  margin: 0 auto;
}
.pin-btn:hover { background: #eeede9; }
.pin-btn:active { transform: scale(0.93); background: #e4e3de; }
.pin-btn.del { font-size: 14px; color: #6b6a66; }
.pin-btn.empty { visibility: hidden; cursor: default; }
.pin-err {
  font-size: 11px;
  color: #E24B4A;
  margin-top: 16px;
  min-height: 16px;
  font-weight: 500;
}
.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #f0efe9;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: 12px;
}
.loading-spinner {
  width: 28px; height: 28px;
  border: 3px solid #eeede9;
  border-top-color: #378ADD;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 13px;
  color: #a09f9b;
  font-weight: 500;
}
</style>

function saveStorageLocal() {

/* ============================================================
   FIRESTORE SAVE / LOAD
   ============================================================ */
function saveStorage() {
  saveStorageLocal();
  savePlanToFirestore();
}

function savePlanToFirestore() {
  var batch = db.batch();
  Object.keys(P.plans).forEach(function(dateKey) {
    batch.set(plansCol.doc(dateKey), P.plans[dateKey]);
  });
  batch.set(ownerDoc, { title: P.title }, { merge: true });
  batch.commit().then(function() {
    console.log('Firestore: saved');
  }).catch(function(err) {
    console.warn('Firestore save failed, using localStorage fallback:', err);
    saveStorageLocal();
  });
}

function saveSinglePlan(dateKey) {
  saveStorageLocal();
  plansCol.doc(dateKey).set(P.plans[dateKey]).then(function() {
    console.log('Firestore: plan saved', dateKey);
  }).catch(function(err) {
    console.warn('Firestore save failed:', err);
  });
}

function saveTitleToFirestore() {
  saveStorageLocal();
  ownerDoc.set({ title: P.title }, { merge: true }).then(function() {
    console.log('Firestore: title saved');
  }).catch(function(err) {
    console.warn('Firestore title save failed:', err);
  });
}

function loadStorage() {
  return loadFromFirestore();
}

function loadFromFirestore() {
  var overlay = document.getElementById('loading-overlay');
  if (overlay) overlay.style.display = 'flex';

  return ownerDoc.get().then(function(doc) {
    if (doc.exists && doc.data().title) {
      P.title = doc.data().title;
      document.title = P.title;
    }
    return plansCol.get();
  }).then(function(snapshot) {
    if (!snapshot.empty) {
      P.plans = {};
      snapshot.forEach(function(doc) {
        P.plans[doc.id] = doc.data();
      });
    }
    saveStorageLocal();
    if (overlay) overlay.style.display = 'none';
  }).catch(function(err) {
    console.warn('Firestore load failed, using localStorage fallback:', err);
    loadStorageLocal();
    if (overlay) overlay.style.display = 'none';
  });
}

/* ============================================================

function dc(o) { return JSON.parse(JSON.stringify(o)); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDate(ds) {
  var d = new Date(ds+'T00:00:00');
  return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+DAYS[d.getDay()]+')';
}
function fmtDateShort(ds) {
  var d = new Date(ds+'T00:00:00');
  return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';
}
function isWorkDay(d) {
  var day = d.getDay();
  if (day===0||day===6) return false;
  return !HOL.has(toStr(d));
}
function countWorkDays(s,e) {
  var n=0, d=new Date(s);
  while(d<=e){if(isWorkDay(d))n++;d.setDate(d.getDate()+1);}
  return n;
}
function countSavedDays(s,e) {
  var n=0, d=new Date(s);
  while(d<=e){if(isWorkDay(d)&&P.plans[toStr(d)])n++;d.setDate(d.getDate()+1);}
  return n;
}
function getProgress() {
  var now=new Date(), y=now.getFullYear(), m=now.getMonth();
  var ys=new Date(y,0,1), ye=new Date(y,11,31);
  var ms=new Date(y,m,1), me=new Date(y,m+1,0);
  var dow=now.getDay(), ws=new Date(now);
  ws.setDate(now.getDate()-(dow===0?6:dow-1));
  var we=new Date(ws); we.setDate(ws.getDate()+6);
  function c(s,e){var t=countWorkDays(s,e),sv=countSavedDays(s,e);return{t:t,sv:sv,p:t?Math.round(sv/t*100):0};}
  return {yr:c(ys,ye), mo:c(ms,me), wk:c(ws,we)};
}
function stLabel(s) {
  if(s==='o') return '<span class="st-o">○</span>';
  if(s==='d') return '<span class="st-d">△</span>';
  if(s==='x') return '<span class="st-x">✕</span>';
  return '';
}
function stFromEl(el) {
  var b = el.querySelector('.sb.o,.sb.d,.sb.x');
  if(!b) return '';
  return b.classList.contains('o')?'o':b.classList.contains('d')?'d':'x';
}
function setSt(btn, t) {
  var wasActive = btn.classList.contains(t);
  btn.closest('.status-row').querySelectorAll('.sb').forEach(function(b){b.className='sb';});
  if (!wasActive) btn.classList.add(t);
}

/* ============================================================
   EDIT TOGGLE + SYNC
   ============================================================ */
function toggleEdit(slot) {
  if(P.wipEdit==='y') syncY();
  if(P.wipEdit==='p') syncP();
  if(P.wipEdit==='s') syncS();
  P.wipEdit = (P.wipEdit===slot) ? null : slot;
  render();
}
function syncY() {
  var arr=[],i=0;
  while(document.getElementById('yp-'+i)){
    var tasks=[],ti=0;
    while(document.getElementById('yt-'+i+'-'+ti)){
      var row=document.getElementById('ytr-'+i+'-'+ti);
      tasks.push({t:document.getElementById('yt-'+i+'-'+ti).value, s:row?stFromEl(row):''});
      ti++;
    }
    arr.push({period:document.getElementById('yp-'+i).value, gn:document.getElementById('yn-'+i).value, tasks:tasks, done:false});
    i++;
  }
  if(arr.length) P.wip.yg=arr;
}
function syncP() {
  var arr=[],gi=0;
  while(document.getElementById('egp-'+gi)){
    var areas=[],ai=0;
    while(document.getElementById('ega-'+gi+'-'+ai)){
      var rows=[],ri=0;
      while(document.getElementById('ept-'+gi+'-'+ai+'-'+ri)){
        var tr=document.getElementById('ptr-'+gi+'-'+ai+'-'+ri);
        rows.push({
          pt:(document.getElementById('ept-'+gi+'-'+ai+'-'+ri)||{}).value||'',
          ft:(document.getElementById('eft-'+gi+'-'+ai+'-'+ri)||{}).value||'',
          fs:tr?stFromEl(tr):''
        });
        ri++;
      }
      if(rows.length) areas.push({area:document.getElementById('ega-'+gi+'-'+ai).value, rows:rows});
      ai++;
    }
    if(areas.length) arr.push({period:document.getElementById('egp-'+gi).value, areas:areas});
    gi++;
  }
  if(arr.length) P.wip.pg=arr;
}
function syncS() {
  var arr=[],i=0;
  while(document.getElementById('st-'+i)){
    arr.push({time:document.getElementById('st-'+i).value, label:document.getElementById('sl-'+i).value});
    i++;
  }
  if(arr.length) P.wip.sc=arr;
}
function saveY(){syncY();P.wipEdit=null;render();}
function saveP(){syncP();P.wipEdit=null;render();}
function saveSC(){syncS();P.wipEdit=null;render();}

function addYE(){syncY();P.wip.yg.push({period:'',gn:'',tasks:[{t:'',s:''}],done:false});P.wipEdit='y';render();}
function addYT(ei){syncY();if(P.wip.yg[ei])P.wip.yg[ei].tasks.push({t:'',s:''});P.wipEdit='y';render();}
function rmYE(ei){syncY();P.wip.yg.splice(ei,1);P.wipEdit='y';render();}
function rmYT(ei,ti){syncY();if(P.wip.yg[ei])P.wip.yg[ei].tasks.splice(ti,1);P.wipEdit='y';render();}
function addPRow(gi,ai){syncP();if(P.wip.pg[gi]&&P.wip.pg[gi].areas[ai])P.wip.pg[gi].areas[ai].rows.push({pt:'',ft:'',fs:''});P.wipEdit='p';render();}
function rmPRow(gi,ai,ri){
  syncP();var pg=P.wip.pg;
  if(pg[gi]&&pg[gi].areas[ai]){
    pg[gi].areas[ai].rows.splice(ri,1);
    if(!pg[gi].areas[ai].rows.length){pg[gi].areas.splice(ai,1);if(!pg[gi].areas.length)pg.splice(gi,1);}
  }
  P.wipEdit='p';render();
}
function addPArea(gi){syncP();if(P.wip.pg[gi])P.wip.pg[gi].areas.push({area:'',rows:[{pt:'',ft:'',fs:''}]});P.wipEdit='p';render();}
function rmPArea(gi,ai){
  syncP();var pg=P.wip.pg;
  if(pg[gi]&&pg[gi].areas){
    pg[gi].areas.splice(ai,1);
    if(!pg[gi].areas.length) pg.splice(gi,1);
  }
  P.wipEdit='p';render();
}
function rmPGrp(gi){syncP();P.wip.pg.splice(gi,1);P.wipEdit='p';render();}
function addPGrpWith(label){syncP();P.wip.pg.push({period:label,areas:[{area:'',rows:[{pt:'',ft:'',fs:''}]}]});P.wipEdit='p';render();}
function addSR(){syncS();P.wip.sc.push({time:'',label:''});P.wipEdit='s';render();}
function rmSR(i){syncS();P.wip.sc.splice(i,1);P.wipEdit='s';render();}

/* ============================================================
   MAIN ACTIONS
   ============================================================ */
function savePlan() {
  if(P.wipEdit==='y') syncY();
  if(P.wipEdit==='p') syncP();
  if(P.wipEdit==='s') syncS();
  var fb=document.getElementById('fbk');
  if(fb) P.wip.fb=fb.value;
  P.plans[P.wipDate]=dc(P.wip);
  saveSinglePlan(P.wipDate);
  P.scr='home'; P.wipEdit=null; render();
  var t=document.getElementById('toast-home');
  if(t){
    t.innerHTML='<div class="toast">'+fmtDateShort(P.wipDate)+' 계획표 저장 완료</div>';
    setTimeout(function(){if(t)t.innerHTML='';},3000);
  }
}
function goHome(){P.scr='home';P.wipEdit=null;render();}
function goWrite() {
  var ds=toStr(new Date()), ex=P.plans[ds];
  if(ex){P.wip=dc(ex);}
  else{var prev=getPrevPlan(ds);if(prev){P.wip=dc(prev);P.wip.date=ds;P.wip.fb='';}else{P.wip=defPlan(ds);}}
  P.wipDate=ds; P.wipEdit=null; P.scr='write'; render();
}
function openDetail(ds){P.wip=dc(P.plans[ds]);P.wipDate=ds;P.wipEdit=null;P.scr='write';render();}
function editTitle(){
  var tw=document.getElementById('title-wrap');if(!tw)return;
  tw.innerHTML='<input class="title-input" id="title-inp" value="'+esc(P.title)+'" onblur="saveTitle()" onkeydown="if(event.key===\'Enter\')this.blur()">';
  var i=document.getElementById('title-inp');if(i){i.focus();i.select();}
}
function saveTitle(){
  var i=document.getElementById('title-inp');
  if(i&&i.value.trim()){P.title=i.value.trim();document.title=P.title;saveTitleToFirestore();}
  render();
}

/* ============================================================
   PIN
   ============================================================ */
var CORRECT_PIN = '0206';
var pinVal = '';

function checkAuth() {
  /* 세션 동안 인증 유지 */
  if (sessionStorage.getItem('planner_auth') === '1') {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    document.getElementById('pin-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
}

function pinPress(val) {
  if (pinVal.length >= 4) return;
  pinVal += val;
  updateDots();
  if (pinVal.length === 4) {
    setTimeout(checkPin, 120);
  }
}

function pinDel() {
  pinVal = pinVal.slice(0, -1);
  updateDots();
  document.getElementById('pin-err').textContent = '';
}

function updateDots() {
  var dots = document.querySelectorAll('.pin-dot');
  dots.forEach(function(d, i) {
    d.classList.toggle('filled', i < pinVal.length);
    d.classList.remove('error');
  });
}

function checkPin() {
  if (pinVal === CORRECT_PIN) {
    sessionStorage.setItem('planner_auth', '1');
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadStorageLocal();
    render();
    loadFromFirestore().then(function() {
      render();
    });
  } else {
    document.querySelectorAll('.pin-dot').forEach(function(d) {
      d.classList.add('error');
      d.classList.remove('filled');
    });
    document.getElementById('pin-err').textContent = '핀 번호가 올바르지 않습니다';
    setTimeout(function() {
      pinVal = '';
      updateDots();
      document.getElementById('pin-err').textContent = '';
    }, 900);
  }
}

/* ============================================================
   INIT
   ============================================================ */
loadStorageLocal();
checkAuth();
if (sessionStorage.getItem('planner_auth') === '1') {
  render();
  loadFromFirestore().then(function() {
    render();
  });
}
